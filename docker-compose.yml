version: '3.8'

# Full stack: PostgreSQL + API + Web
# Run: docker compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: prestamos-db
    environment:
      POSTGRES_USER: prestamos
      POSTGRES_PASSWORD: prestamos_dev
      POSTGRES_DB: prestamos
    ports:
      - "5432:5432"
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prestamos -d prestamos"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  # API Server
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: prestamos-api
    environment:
      DATABASE_URL: postgresql://prestamos:prestamos_dev@postgres:5432/prestamos?schema=public
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRES_IN: 7d
      LANG: es_AR.UTF-8
      LC_ALL: es_AR.UTF-8
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
  # Web Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: prestamos-web
    environment:
      NODE_ENV: production
      LANG: es_AR.UTF-8
      LC_ALL: es_AR.UTF-8
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: always
